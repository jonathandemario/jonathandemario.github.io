<style>
  @font-face {
      font-family: 'SuperMario256';
      src: url('assets/font/SuperMario256.ttf');
  }

  @font-face {
      font-family: 'Alphakind';
      src: url('assets/font/Alphakind.otf');
  }

  * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: 'Alphakind', sans-serif;
  }

  body {
      height: 100vh;
      width: 100%;
  }

  .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('assets/img/background.png');
      background-size: cover;
      background-attachment: fixed;
      background-repeat: repeat-y;
      z-index: -1;
      filter: brightness(60%);
  }

  .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 100px;
  }

  .container:after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      left: 0;
      top: 0;
      background-size: cover;
      z-index: -1;
      background-attachment: fixed;
  }

  .contact-box {
      margin-top: 60px;
      max-width: 850px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      justify-content: center;
      align-items: center;
      background-color: #fff;
      box-shadow: -10px 10px 19px 5px rgba(0, 0, 0, 0.8);
      border-radius: 20px;
  }

  .left {
      background: url("assets/img/left.png") no-repeat center;
      background-size: cover;
      height: 100%;
      border-top-left-radius: 20px;
      border-bottom-left-radius: 20px;
  }

  .right {
      padding: 25px 40px;
  }

  h1 {
      position: relative;
      padding: 0 0 10px;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'SuperMario256', sans-serif;
      color: rgb(255, 200, 0) !important;
      -webkit-text-stroke-width: 2px;
      -webkit-text-stroke-color: black;
      letter-spacing: 4px;
      font-size: 38px;
  }

  h1:after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      height: 4px;
      width: 50px;
      border-radius: 2px;
      background-color: darkred;
  }

  .label-font {
      font-size: 1.3rem;
  }

  .field {
      width: 100%;
      border: 2px solid rgba(0, 0, 0, 0);
      outline: none;
      background-color: rgba(230, 230, 230, 0.6);
      padding: 0.5rem 1rem;
      font-size: 1.1rem;
      margin-top: 10px;
      margin-bottom: 22px;
      transition: 0.3s;
      border-radius: 8px;
  }

  .field:hover {
      background-color: rgba(0, 0, 0, 0.1);
  }

  textarea {
      min-height: 150px;
      border-radius: 8px;
  }

  .btn.submit {
      width: 100%;
      padding: 0.5rem 1rem;
      background-color: darkred;
      color: #fff;
      letter-spacing: 3px;
      font-size: 1.1rem;
      border: none;
      outline: none;
      cursor: pointer;
      transition: 0.3s;
      border-radius: 8px;
  }

  .btn.submit:hover {
      background-color: darkslateblue;
  }

  .field:focus {
      border: 2px solid rgba(30, 85, 250, 0.47);
      background-color: #fff;
  }

  @media screen and (max-width: 1000px) {
      body {
          min-height: 100vh;
      }

      .container {
          padding: 20px 40px;
      }

      .contact-box {
          max-width: 100%;
          grid-template-columns: 1fr;
          border-radius: 10px;
          margin-top: 80px;
      }

      .left {
          height: 30vh;
          border-top-right-radius: 10px;
          border-top-left-radius: 10px;
          border-bottom-left-radius: 0px;
      }

      .right {
          padding: 15px 20px;
      }
  }

  .hidden {
      display: none;
  }

  @media screen and (max-width: 500px) {
      textarea {
          min-height: 90px;
      }

      .contact-box {
          margin-top: 5vh !important;
          /* margin-bottom: 10vh; */
      }
  }

  @media screen and (max-width: 400px) {
      .left {
          height: 25vh;
      }

      textarea {
          min-height: 90px;
      }

      .contact-box {
          margin-top: 10vh !important;
          /* margin-bottom: 10vh; */
      }
  }

  @media screen and (max-width: 370px) {
      .container {
          height: 105vh;
      }

      .contact-box {
          margin-top: 12vh !important;
          /* margin-bottom: 10vh; */
      }
  }
</style>
